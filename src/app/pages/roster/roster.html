<app-navbar />

<div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-8 mx-8 mt-6">

  <div class="flex justify-between items-center mb-8">

    <h2 class="text-3xl font-bold text-gray-800">
      Elenco
    </h2>

    <a
      href="/elenco/crear"
      class="px-5 py-3 rounded-lg bg-red-600 text-white font-semibold hover:bg-red-700 transition">
      +Registrar
    </a>

  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">

    @for (character of roster(); track character.id; let i = $index) {

      <div
        class="rounded-2xl shadow-lg transition hover:scale-105 overflow-hidden"

        [class.bg-gradient-to-br]="i === 0"
        [class.from-yellow-100]="i === 0"
        [class.to-amber-50]="i === 0"
        [class.border-4]="i === 0"
        [class.border-yellow-400]="i === 0"

        [class.bg-white]="i !== 0"
        [class.border]="i !== 0"
        [class.border-gray-200]="i !== 0">

        @if(i === 0){

          <div class="bg-yellow-400 text-center font-bold py-2 text-yellow-900">
            ⭐ PERSONAJE PRINCIPAL ⭐
          </div>

        }@else{
          <div class="bg-red-600 text-center font-bold py-2 text-white"> 
            Secundario
          </div>
        }

        <div class="p-6 flex flex-col items-center">

            <img
            [src]="'/imagenes/Super Smash Bros. Ultimate Renders/' + character.character.id + '.png'"
            [alt]="character.character.name"
            class="w-56 h-56 object-contain transition-all duration-300">

          <h3
            class="text-3xl font-extrabold mt-4 text-center">

            {{ character.character.name }}

          </h3>

        @if(i === 0){

        <a
          [routerLink]="['/notas', character.id]"
          class="mt-6 flex w-full items-center justify-center rounded-lg bg-yellow-400 text-yellow-900 py-3 font-semibold hover:bg-yellow-500 transition cursor-pointer">
           📝 Ver notas
        </a>
       
        }@else{

        <a
          [routerLink]="['/notas', character.id]"
          class="mt-6 flex w-full items-center justify-center rounded-lg bg-red-600 text-white py-3 font-semibold hover:bg-red-700 transition cursor-pointer">
          📝 Ver notas
        </a>
        }

   

        </div>

      </div>

    }

  </div>

</div>
