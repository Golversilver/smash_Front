<app-navbar />

<div class="max-w-5xl mx-auto mt-8 mb-10 space-y-8">

  <h1 class="text-4xl font-extrabold text-gray-800">
    Agregar personaje al elenco
  </h1>

  <div class="bg-white rounded-2xl shadow-xl overflow-hidden">

    <!-- [formGroup]="rosterForm" (ngSubmit)="createRoster() -->

    <form [formGroup]="rosterForm" (ngSubmit)="rosterRegister()">

      <div class="bg-red-600 text-white px-6 py-4">
        <h2 class="text-xl font-bold">
          Nuevo personaje
        </h2>
      </div>

      <div class="p-8 space-y-6">

        <!-- Personaje -->
        <div>
          <label class="block text-gray-600 font-medium mb-2">
            Personaje
          </label>

          <select
            formControlName="characterId"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-red-500">

            <option value="" disabled>
              Selecciona un personaje
            </option>

            @for(character of characters(); track character.id) {
              <option [value]="character.id">
                {{ character.name }}
              </option>
            } 

          </select>
        </div>

        <!-- Main -->
        <div class="flex items-center gap-3">

          <input
            id="main"
            type="checkbox"
            formControlName="main"
            class="w-5 h-5 accent-red-600">

          <label
            for="main"
            class="text-gray-700 font-medium">
            Establecer como personaje principal (Main)
          </label>

        </div>

        <!-- @if (error()) {
          <p class="text-red-600">
            {{ error() }}
          </p>
        } -->

        <div class="flex justify-end">

          <button
            type="submit"
            class="cursor-pointer px-6 py-3 rounded-lg bg-red-600 text-white font-semibold hover:bg-red-700 transition">

            Agregar al elenco

          </button>

        </div>

      </div>

    </form>

  </div>

</div>
