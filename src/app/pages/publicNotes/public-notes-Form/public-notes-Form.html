<app-navbar />

<div class="max-w-4xl mx-auto px-8 py-10">

  <div class="bg-white rounded-2xl shadow-xl overflow-hidden">

    <div class="bg-red-600 text-white px-8 py-5">

    <h1 class="text-3xl font-bold">
     Copiar nota
    </h1>

    <p class="text-red-100 mt-1">
      Copia esta nota para tus notas personales
    </p>

    </div>

    <form  class="p-8 space-y-8" [formGroup]="rosterNoteForm" (ngSubmit)="copyNote(rosterId)">

      <!-- Título -->
      <div>

        <label class="block mb-2 font-semibold text-gray-700">
          Título
        </label>

        <input
          type="text"
          formControlName="title"
          placeholder="Ej. Castigar Up Smash"
          class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-red-500 focus:outline-none">

      </div>

      <!-- Descripción -->
      <div>

        <label class="block mb-2 font-semibold text-gray-700">
          Descripción
        </label>

        <textarea
          rows="6"
          formControlName="description"
          placeholder="Escribe aquí la nota..."
          class="w-full rounded-lg border border-gray-300 px-4 py-3 resize-none focus:ring-2 focus:ring-red-500 focus:outline-none">
        </textarea>

      </div>

      <!-- Prioridad -->
      <div>

        <label class="block mb-2 font-semibold text-gray-700">
          Prioridad
        </label>

        <select
          formControlName="importance"
          class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-red-500 focus:outline-none">

          <option value="" disabled>
            Selecciona una prioridad
          </option>

          <option value="HIGH">
            🔴 Alta
          </option>

          <option value="MEDIUM">
            🟡 Media
          </option>

          <option value="LOW">
            🟢 Baja
          </option>

        </select>

      </div>


      <!-- Botones -->
      <div class="flex justify-end gap-4">

        @if(rivalId()) {
        <a
          [routerLink]="['/notas-publicas', rosterId]"
          [queryParams]="{rival: rivalId()}"
          class="px-6 py-3 rounded-lg border border-gray-300 hover:bg-gray-100 transition">

          Cancelar

        </a>
        }@else{

        <a
          [routerLink]="['/notas-publicas', rosterId]"
          class="px-6 py-3 rounded-lg border border-gray-300 hover:bg-gray-100 transition">

          Cancelar

        </a>

        }



        <button
          type="submit"
          class="cursor-pointer px-6 py-3 rounded-lg bg-red-600 text-white font-semibold hover:bg-red-700 transition">

          Copiar nota

        </button>

      </div>

    </form>

  </div>

</div>
