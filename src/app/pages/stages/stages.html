<app-navbar />

<div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-8 mx-8 mt-6">

 <div class="mt-8 bg-white rounded-xl shadow-xl overflow-hidden">

      <div class="bg-red-600 text-white px-6 py-4 flex justify-between items-center">

        <h2 class="text-xl font-bold">
         Escenarios
        </h2>

      </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

        @for (stage of stages(); track stage.id) {

            <div class="rounded-xl border border-gray-200 bg-white shadow hover:shadow-lg transition p-5">

            <img
                [src]="'/imagenes/stages/' + stage.id + '.png'"
                [alt]="stage.name"
                class="w-full h-40 object-contain">

            <h3 class="mt-4 text-lg font-bold text-center text-gray-800">
                {{ stage.name }}
            </h3>

            </div>

        }

        </div>
       
    </div>
</div>
