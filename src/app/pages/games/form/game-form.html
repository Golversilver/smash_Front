<app-navbar />
<div class="max-w-3xl mx-auto mt-8 bg-white rounded-2xl shadow-xl overflow-hidden">

  <div class="bg-red-600 text-white px-6 py-4">
    <h2 class="text-2xl font-bold">
      Registrar combate
    </h2>
  </div>

  <div class="p-8 space-y-6">

    <!-- Mi personaje -->
    <div>
      <label class="block mb-2 font-semibold text-gray-700">
        Mi personaje
      </label>

      <select class="w-full border rounded-lg px-4 py-3">
        <option>Zero Suit Samus</option>
      </select>
    </div>

    <!-- Rival -->
    <div>
      <label class="block mb-2 font-semibold text-gray-700">
        Personaje rival
      </label>

      <select class="w-full border rounded-lg px-4 py-3">
        <option>Fox</option>
      </select>
    </div>

    <!-- Stage -->
    <div>
      <label class="block mb-2 font-semibold text-gray-700">
        Escenario
      </label>

      <select class="w-full border rounded-lg px-4 py-3">
        <option>Pokémon Stadium 2</option>
      </select>
    </div>

    <!-- Resultado -->
    <div>

      <label class="block mb-3 font-semibold text-gray-700">
        Resultado
      </label>

      <div class="flex gap-8">

        <label class="flex items-center gap-2">
          <input type="radio" name="win">
          Victoria
        </label>

        <label class="flex items-center gap-2">
          <input type="radio" name="win">
          Derrota
        </label>

      </div>

    </div>

    <!-- Modalidad -->
    <div>

      <label class="block mb-3 font-semibold text-gray-700">
        Modalidad
      </label>

      <div class="flex gap-8">

        <label class="flex items-center gap-2">
          <input type="radio" name="online">
          Online
        </label>

        <label class="flex items-center gap-2">
          <input type="radio" name="online">
          Offline
        </label>

      </div>

    </div>

    <div class="flex justify-end gap-4 pt-4">

      <button
        class="px-6 py-3 rounded-lg border border-gray-300 hover:bg-gray-100 transition">
        Cancelar
      </button>

      <button
        class="px-6 py-3 rounded-lg bg-red-600 text-white font-semibold hover:bg-red-700 transition">
        Registrar combate
      </button>

    </div>

  </div>

</div>
