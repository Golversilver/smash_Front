<app-navbar />

<div class="max-w-5xl mx-auto mt-8 mb-10 space-y-8">

  <h1 class="text-4xl font-extrabold text-gray-800">
    Mi Perfil
  </h1>

  <!-- Información del usuario -->
  <div class="bg-white rounded-2xl shadow-xl overflow-hidden">

     <form [formGroup]="profileForm" (ngSubmit)="updateprofile()">

    <div class="bg-red-600 text-white px-6 py-4">
      <h2 class="text-xl font-bold">
        Información de la cuenta
      </h2>
    </div>

    <div class="p-8">

     
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <div>
          <label class="block text-gray-600 font-medium mb-2">
            Nombre
          </label>

          <input
            type="text"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-red-500"
            formControlName="name">
        </div>

        <div>
          <label class="block text-gray-600 font-medium mb-2">
            Correo electrónico
          </label>

          <input
            type="email"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-red-500"
            formControlName="email">
        </div>

      </div>

      <div class="flex justify-end mt-8">

        <button
          class="cursor-pointer px-6 py-3 rounded-lg bg-red-600 text-white font-semibold hover:bg-red-700 transition">
          Guardar cambios
        </button>

      </div>

    </div>

     </form>

  </div>

  <!-- Cambiar contraseña -->
  <div class="bg-white rounded-2xl shadow-xl overflow-hidden">

    <div class="bg-red-600 text-white px-6 py-4">
      <h2 class="text-xl font-bold">
        Cambiar contraseña
      </h2>
    </div>

    <div class="p-8">

      <form [formGroup]="passwordForm" (ngSubmit)="updatePassword()">

      <div class="space-y-6">

        <div>
          <label class="block text-gray-600 font-medium mb-2">
            Nueva contraseña
          </label>

          <input
            type="password"
            formControlName="password"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-red-500">
        </div>

        <div>
          <label class="block text-gray-600 font-medium mb-2">
            Confirmar nueva contraseña
          </label>

          <input
            type="password"
            formControlName="passwordRepeat"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-red-500">
        </div>

      </div>

      @if (passwordError()) {
        <p class="text-red-600">
          {{passwordError()}}
        </p>
      }

      <div class="flex justify-end mt-8">

        <button
          class="cursor-pointer px-6 py-3 rounded-lg bg-red-600 text-white font-semibold hover:bg-red-700 transition">
          Actualizar contraseña
        </button>

      </div>

      </form>

    </div>
 
  </div>
  

</div>
